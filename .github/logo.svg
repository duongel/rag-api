<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="112" height="112" rx="24" fill="url(#bg)"/>
  <!-- Search/magnifying glass -->
  <circle cx="52" cy="48" r="18" fill="none" stroke="white" stroke-width="4.5" opacity="0.95"/>
  <line x1="65" y1="61" x2="80" y2="76" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <!-- Document lines inside lens -->
  <line x1="43" y1="42" x2="61" y2="42" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="43" y1="48" x2="57" y2="48" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="43" y1="54" x2="55" y2="54" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Connection nodes (graph/RAG) -->
  <circle cx="86" cy="34" r="5" fill="white" opacity="0.85"/>
  <circle cx="98" cy="52" r="4" fill="white" opacity="0.65"/>
  <circle cx="40" cy="82" r="4" fill="white" opacity="0.65"/>
  <circle cx="60" cy="90" r="5" fill="white" opacity="0.85"/>
  <circle cx="82" cy="88" r="4" fill="white" opacity="0.65"/>
  <!-- Connection lines -->
  <line x1="86" y1="34" x2="98" y2="52" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="82" x2="60" y2="90" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="60" y1="90" x2="82" y2="88" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="76" x2="82" y2="88" stroke="white" stroke-width="1.5" opacity="0.4"/>
</svg>
