# Distribution version – uses pre-built image from ghcr.io.
# No local build required. Used by install.sh.
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-network
    profiles:
      - local-ollama
    restart: unless-stopped

  rag-api:
    image: ghcr.io/duongel/rag-api:latest
    container_name: rag-api
    volumes:
      - ${VAULT_PATH:-/tmp/empty}:/obsidian:ro
      - chroma_data:/app/data
    expose:
      - "8080"
    environment:
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434}"
      VAULT_PATH: "/obsidian"
      CHROMA_PATH: "/app/data/chroma"
      EMBED_MODEL: "${EMBED_MODEL:-nomic-embed-text}"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:8484}"
      AUTH_REQUIRED: "${AUTH_REQUIRED:-true}"
      API_BEARER_TOKEN: "${API_BEARER_TOKEN}"
      DATA_SOURCES: "${DATA_SOURCES:-all}"
      PAPERLESS_URL: "${PAPERLESS_URL:-}"
      PAPERLESS_TOKEN: "${PAPERLESS_TOKEN:-}"
    restart: unless-stopped
    networks:
      - rag-network

volumes:
  chroma_data:
  ollama_data:

networks:
  rag-network:
    external: true
    name: "${DOCKER_NETWORK:-rag-network}"
